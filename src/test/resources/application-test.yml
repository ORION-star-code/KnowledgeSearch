spring:
  datasource:
    url: jdbc:h2:mem:knowledge_search;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  elasticsearch:
    uris: http://localhost:9200
  jackson:
    default-property-inclusion: non_null

app:
  canal:
    enabled: false
  sync:
    retry:
      enabled: false
